name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (gofmt + vet)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy is clean
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum drifted; run 'go mod tidy' locally and commit"
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go test
        run: go test -race -count=1 ./...

  mcp-smoke:
    # End-to-end smoke test: build the binary, spawn it, send JSON-RPC
    # initialize + tools/list, assert the advertised tool inventory and
    # spot-check annotations. Catches schema-emission regressions that the
    # in-process unit tests cannot — those exercise the Go types directly,
    # this exercises the actual stdio transport.
    name: mcp smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        env:
          BIN: ${{ runner.os == 'Windows' && './bin/balenamcp.exe' || './bin/balenamcp' }}
        run: go build -o "$BIN" .

      - name: Drive server via stdio JSON-RPC and assert tool inventory
        # bash + jq are preinstalled on all three GitHub-hosted runners.
        # Forcing shell: bash so the Windows runner uses Git Bash, not pwsh.
        shell: bash
        env:
          BIN: ${{ runner.os == 'Windows' && './bin/balenamcp.exe' || './bin/balenamcp' }}
        run: |
          set -euo pipefail
          # Send initialize, the initialized notification, then tools/list.
          # The server emits one JSON object per request (none for notifications);
          # we read the second response line which is the tools/list result.
          response=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')

          echo "tools/list response:"
          echo "$response" | jq '.result.tools | length as $n | "\($n) tools advertised"'

          # Required tools (the user-facing surface). Failing here means a
          # tool was dropped or renamed without test coverage.
          required=(
            version whoami fleet-list fleet-info device-list device-info
            device-logs device-type-list release-list release-info
            release-asset-list tag-list env-list os-versions
            organization-list ssh-key-list api-key-list
            device-detect device-local-mode-get
            device-reboot device-restart device-shutdown device-purge
            device-ssh device-pin device-track-fleet fleet-pin release-finalize
            tag-set tag-rm env-set env-rm env-rename
            device-local-mode-set release-invalidate release-validate
            fleet-track-latest fleet-purge fleet-restart fleet-rm
            organization-create organization-rename organization-rm api-key-revoke
          )
          missing=()
          for t in "${required[@]}"; do
            if ! echo "$response" | jq -e --arg t "$t" '.result.tools[] | select(.name == $t)' >/dev/null; then
              missing+=("$t")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing tools: ${missing[*]}"
            exit 1
          fi

          # Spot-check annotation correctness: device-list must be read-only,
          # device-reboot must be destructive.
          ro=$(echo "$response" | jq -r '.result.tools[] | select(.name == "device-list") | .annotations.readOnlyHint')
          [ "$ro" = "true" ] || { echo "::error::device-list is not readOnlyHint=true (got $ro)"; exit 1; }
          de=$(echo "$response" | jq -r '.result.tools[] | select(.name == "device-reboot") | .annotations.destructiveHint')
          [ "$de" = "true" ] || { echo "::error::device-reboot is not destructiveHint=true (got $de)"; exit 1; }

          # Also drive one tool call end-to-end through stdio in dry-run.
          call=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"device-list","arguments":{"fleet":"my-fleet","json":true}}}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          text=$(echo "$call" | jq -r '.result.content[0].text')
          echo "device-list dry-run -> $text"
          echo "$text" | grep -q -- '--fleet my-fleet --json' \
            || { echo "::error::dry-run argv unexpected: $text"; exit 1; }

          # Assert the workflow prompts are advertised over the transport. The
          # unit tests exercise the Go handlers directly; this checks the
          # actual prompts/list JSON-RPC emission.
          prompts=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"prompts/list"}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          echo "prompts/list response:"
          echo "$prompts" | jq '.result.prompts | length as $n | "\($n) prompts advertised"'
          required_prompts=(
            diagnose-device fleet-health-report safe-release-rollout
            rollback-device audit-config compare-releases replicate-config
            bulk-tag
          )
          missing_prompts=()
          for p in "${required_prompts[@]}"; do
            if ! echo "$prompts" | jq -e --arg p "$p" '.result.prompts[] | select(.name == $p)' >/dev/null; then
              missing_prompts+=("$p")
            fi
          done
          if [ ${#missing_prompts[@]} -ne 0 ]; then
            echo "::error::missing prompts: ${missing_prompts[*]}"
            exit 1
          fi

          # Drive one prompts/get end-to-end: assert the arg is interpolated
          # and the runbook names a real tool the model should call.
          getp=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"prompts/get","params":{"name":"diagnose-device","arguments":{"uuid":"abc123"}}}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          ptext=$(echo "$getp" | jq -r '.result.messages[0].content.text')
          echo "diagnose-device prompt (first 60 chars) -> ${ptext:0:60}"
          echo "$ptext" | grep -q 'abc123' \
            || { echo "::error::prompts/get did not interpolate uuid: $ptext"; exit 1; }
          echo "$ptext" | grep -q 'device-info' \
            || { echo "::error::prompts/get runbook missing tool name: $ptext"; exit 1; }

          # Assert the static resources are advertised over the transport.
          resources=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"resources/list"}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          echo "resources/list response:"
          echo "$resources" | jq '.result.resources | length as $n | "\($n) static resources advertised"'
          required_resources=(
            balena://account balena://account/keys balena://fleets
            balena://device-types balena://gotchas
          )
          missing_resources=()
          for u in "${required_resources[@]}"; do
            if ! echo "$resources" | jq -e --arg u "$u" '.result.resources[] | select(.uri == $u)' >/dev/null; then
              missing_resources+=("$u")
            fi
          done
          if [ ${#missing_resources[@]} -ne 0 ]; then
            echo "::error::missing resources: ${missing_resources[*]}"
            exit 1
          fi

          # Read a template resource end-to-end: the device snapshot must
          # aggregate multiple sub-calls into one JSON document keyed by uuid.
          readres=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"balena://device/abc123"}}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          rtext=$(echo "$readres" | jq -r '.result.contents[0].text')
          echo "device resource (first 80 chars) -> ${rtext:0:80}"
          # The aggregated document must be valid JSON carrying the uuid and the
          # composed section keys.
          echo "$rtext" | jq -e '.uuid == "abc123" and has("info") and has("logs") and has("env") and has("tags")' >/dev/null \
            || { echo "::error::device resource document missing expected keys: $rtext"; exit 1; }

          # Read a second template — the release snapshot — to confirm the
          # single-segment template route and its composed keys.
          relres=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"balena://release/abc123"}}' \
            | "$BIN" -dry-run 2>/dev/null \
            | sed -n '2p')
          reltext=$(echo "$relres" | jq -r '.result.contents[0].text')
          echo "release resource (first 80 chars) -> ${reltext:0:80}"
          echo "$reltext" | jq -e '.release == "abc123" and has("info") and has("composition") and has("assets")' >/dev/null \
            || { echo "::error::release resource document missing expected keys: $reltext"; exit 1; }

  coverage:
    # Measures total statement coverage with cross-package attribution
    # (-coverpkg=./...) so hits from main_test.go count against server/*. A
    # single Ubuntu run is sufficient — line coverage doesn't vary by OS, and
    # running the full matrix here would just multiply runtime without adding
    # signal. The threshold is intentionally one notch below the current
    # local number so new feature commits don't immediately fail CI; bump it
    # up as the suite grows.
    name: coverage (>= 80%)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COVERAGE_MIN: "80.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./... \
            ./...

      - name: Enforce minimum coverage
        run: |
          set -euo pipefail
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          # bc is on every GHA runner; awk works too but bc reads cleaner here.
          if awk -v t="$total" -v m="$COVERAGE_MIN" 'BEGIN { exit !(t < m) }'; then
            echo "::error::coverage ${total}% is below the ${COVERAGE_MIN}% floor"
            echo "::group::Uncovered functions"
            go tool cover -func=coverage.out | grep -v '100.0%' | grep -v '^total:'
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

  ci-required-checks:
    # Single check for branch protection to gate on. Aggregates every job
    # whose failure should block merging. Add new required jobs by extending
    # `needs` — nothing else to change.
    name: ci required checks passed
    if: always()
    needs: [lint, test, mcp-smoke, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key): \(.value.result)"
          ')
          if [ -n "$failing" ]; then
            echo "Failed or cancelled jobs:"
            echo "$failing"
            exit 1
          fi
          echo "All required jobs passed."
