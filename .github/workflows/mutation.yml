name: Mutation Testing

# Mutation testing answers "do our tests actually ASSERT on behavior, or just
# touch the code?" It mutates source (flip operators, change return values,
# negate conditionals) and re-runs the suite. A passing suite against a
# mutation = "lived" mutant = weak assertion somewhere.
#
# Not a per-PR check — runtime is ~test-suite-time × number-of-mutants, well
# into multi-minute territory. Run on demand (workflow_dispatch) or weekly
# (schedule) as a periodic test-quality audit.
#
# Also: gremlins has a known Windows bug (path-separator mismatch between
# the cover profile and the AST scanner) that classifies every mutant as
# "not covered". Pinning to ubuntu-latest sidesteps it.

on:
  workflow_dispatch:
    inputs:
      fail-under-efficacy:
        description: "Fail the run if mutation efficacy is below this percent (0 = report only)"
        required: false
        default: "0"
        type: string
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    name: gremlins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GREMLINS_VERSION: v0.6.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gremlins
        # go install pulls the binary into $GOPATH/bin which setup-go adds to
        # PATH for us. Pinning the version keeps mutation reports comparable
        # run-to-run.
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@${GREMLINS_VERSION}

      - name: Verify gremlins on PATH
        run: gremlins --version

      - name: Run mutation testing
        # --coverpkg=./... is mandatory for this repo. Gremlins gathers
        # coverage with `go test -cover -coverprofile=...` and uses the
        # result to decide which mutants are worth running. Our suite is
        # cross-package (main_test.go in package `main` exercises the
        # `server` package through MCP transport), and without -coverpkg
        # Go credits those hits only to `main`'s profile, leaving server/*
        # lines as count=0. Gremlins then classifies every server mutant
        # as NOT COVERED and runs nothing — that's exactly what happened
        # on the first attempt of this workflow.
        #
        # --integration runs the FULL test suite for each mutant rather
        # than the subset gremlins would heuristically pick. Necessary
        # here because the cross-package assertion path doesn't survive
        # gremlins' per-line test selection.
        #
        # --output emits machine-readable JSON for the artifact upload.
        # --threshold-efficacy gates the exit code on the caller-supplied
        # percent — scheduled runs stay report-only at 0; explicit
        # dispatches can pin a quality bar.
        run: |
          set -euo pipefail
          gremlins unleash \
            --integration \
            --coverpkg=./... \
            --workers=2 \
            --output=gremlins.json \
            --threshold-efficacy=${{ inputs.fail-under-efficacy || '0' }} \
            ./...

      - name: Summarize results
        if: always()
        # Always-run so a failing efficacy gate still surfaces the breakdown.
        run: |
          set -euo pipefail
          if [ ! -f gremlins.json ]; then
            echo "::warning::no gremlins.json produced; skipping summary"
            exit 0
          fi
          echo "## Mutation testing results" >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            "**Test efficacy:** \(.testEfficacy)%",
            "**Mutator coverage:** \(.mutationsCoverage)%",
            "",
            "| Status | Count |",
            "|---|---|",
            "| KILLED | \(.killed)  |",
            "| LIVED | \(.lived)  |",
            "| NOT COVERED | \(.notCovered)  |",
            "| TIMED OUT | \(.timedOut)  |",
            "| NOT VIABLE | \(.notViable)  |",
            "| SKIPPED | \(.skipped)  |"
          ' gremlins.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Lived mutants (likely weak assertions)" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.files[]?.mutants[]? | select(.status == "LIVED") | "- `\(.type)` at \(.fileName):\(.lineNumber):\(.columnNumber)"' \
            gremlins.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gremlins-report
          path: gremlins.json
          retention-days: 30
          if-no-files-found: warn
