name: Release

# Build, sign, and publish release artifacts on every `v*` tag push.
#
# Triggered by:
#   - release-please's tag push when its release PR is merged (only fires if
#     RELEASE_PLEASE_TOKEN is set — see release-please.yml for setup)
#   - Manual `git tag vX.Y.Z && git push origin vX.Y.Z`
#   - workflow_dispatch as a manual recovery path for a tag whose first run
#     failed mid-flight (re-runs against the same tag are idempotent)
#
# The actual build / archive / SBOM / signing / upload logic lives in
# .goreleaser.yaml — this workflow just sets up the runner and invokes it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish, e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Releases must NOT cancel each other — a half-uploaded release is harder
  # to recover from than letting two runs serialize.
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser (build + SBOM + sign + upload)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # GH Release upload needs write on contents.
      contents: write
      # Sigstore keyless signing — cosign exchanges this OIDC token for a
      # short-lived signing certificate from Fulcio. Without id-token: write
      # cosign falls back to interactive flow, which doesn't work in CI.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Goreleaser walks the git log to determine the version, prior
          # tag, and changelog window. Default fetch-depth=1 leaves it
          # blind.
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Release builds are infrequent and full-from-scratch — a poisoned
          # cache would influence what we sign and upload (zizmor
          # cache-poisoning audit).
          cache: false

      - name: Install syft (for SBOMs)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cosign (for keyless signing)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
