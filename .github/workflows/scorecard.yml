name: Scorecard

# OSSF Scorecard — repository-level security best-practices audit. Runs on
# branch_protection_rule (so changes to the rule trigger a re-evaluation) +
# weekly schedule + pushes to main. Intentionally NOT a required check on the
# branch-protection aggregator: scorecard never runs on pull_request, so
# requiring it would leave every PR perpetually pending. The signal lives in
# the Security tab (Code scanning alerts → Scorecard).
#
# Mirrors schubydoo/dump1090-exporter's scorecard.yml — only `master` → `main`.

on:
  branch_protection_rule:
  schedule:
    - cron: "18 7 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
          category: scorecard
