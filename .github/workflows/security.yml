name: Security

# Consolidates the project's security scanners into one file so the security
# posture is grokkable at a glance. Each scanner is its own JOB (not a step)
# so they run in parallel and appear individually in the PR checks list and
# in the code-scanning Security tab.
#
# Mirrors schubydoo/dump1090-exporter's security.yml shape, adapted for Go:
#  - codeql language is `go` (autobuild handles `go build` discovery)
#  - changes-detection watches `go.mod` / `go.sum` instead of pyproject/uv.lock
#  - trivy-fs scans go.sum for vulnerable Go deps automatically

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      deps: ${{ steps.diff.outputs.deps }}
      workflows: ${{ steps.diff.outputs.workflows }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Diff against base
        id: diff
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "${BASE_REF}" --depth=50
          files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files:"
          printf '%s\n' "$files"
          deps=false
          workflows=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              go.mod|go.sum) deps=true ;;
              .github/workflows/*.yml|.github/workflows/*.yaml) workflows=true ;;
            esac
          done <<< "$files"
          {
            echo "deps=$deps"
            echo "workflows=$workflows"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved flags: deps=$deps workflows=$workflows"

  codeql:
    name: codeql analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        # Go is a compiled language in CodeQL — autobuild runs `go build`
        # to produce the analysis database. Works because main.go is at
        # the module root.
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is a JavaScript action pinned to node20 in its
          # action.yml. GitHub is migrating JS actions to node24; this env
          # opts in early so we don't get blindsided by a hard cutover.
          # Safe no-op on runners that haven't shipped node24 yet.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  trivy-fs:
    name: trivy filesystem scan
    needs: changes
    # Skip on PRs that don't touch go.mod/go.sum; always run on push/schedule.
    if: needs.changes.outputs.deps == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Trivy fs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  zizmor:
    name: workflow audit
    needs: changes
    # Skip on PRs that don't touch workflows; always run on push/schedule.
    if: needs.changes.outputs.workflows == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up uv
        # zizmor is a Python tool; uv is the fastest cross-platform way to
        # install it. Matches the dump1090-exporter pattern even though this
        # repo is Go — keeps zizmor invocation identical across projects.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Disable uv's wheel cache. setup-uv tries to hash Python
          # dependency files (requirements*.txt, pyproject.toml, uv.lock,
          # …) to build a cache key; this repo is Go-only, so the glob
          # never matches and the runner logs "The cache will never get
          # invalidated." We install a single tool (zizmor) once per run
          # and discard the environment, so caching has no upside here.
          enable-cache: false
      - name: Install zizmor
        run: uv tool install zizmor
      - name: Run zizmor
        run: zizmor --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor

  dependency-review:
    name: dependency review
    # Only meaningful on PRs (compares HEAD vs base for new vulnerable deps).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  security-required-checks-passed:
    name: security required checks passed
    if: always()
    needs:
      - changes
      - codeql
      - gitleaks
      - trivy-fs
      - zizmor
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key): \(.value.result)"
          ')
          if [ -n "$failing" ]; then
            echo "Failed or cancelled jobs:"
            echo "$failing"
            exit 1
          fi
          echo "All required jobs passed (or were intentionally skipped)."
