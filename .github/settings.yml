# Probot settings — declarative repo configuration.
# Applied by the "Settings" GitHub App: https://probot.github.io/apps/settings/
# Changes here take effect when this file is pushed to the default branch.
#
# Schema reference: https://github.com/repository-settings/app

repository:
  name: balenamcp
  description: >-
    MCP server wrapping the balena CLI — fleets, devices, releases, tags, env vars
  # Topics: GitHub slugs disallow spaces. Probot passes the topics string
  # through to the API, and any topic with a leading space (e.g. ' balena'
  # after a comma+space) gets silently dropped — observed empirically:
  # the first push of this file with `topics: a, b, c` left the repo with
  # zero topics applied. Use a folded scalar + bare commas so the parsed
  # value is exactly `a,b,c` with no internal spaces.
  topics: >-
    mcp,model-context-protocol,balena,balena-cli,mcp-server,golang,go,claude,claude-desktop
  homepage: https://github.com/schubydoo/balenamcp
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true
  allow_update_branch: true
  # Squash button defaults. Both override the GitHub defaults of
  # PR_TITLE / PR_BODY because:
  #
  #   - squash_merge_commit_title: COMMIT_OR_PR_TITLE
  #     Uses the single commit's subject when a PR has only one commit,
  #     falls back to the PR title otherwise. Avoids the "(#NN)" suffix
  #     duplication that PR_TITLE produces on single-commit PRs.
  #
  #   - squash_merge_commit_message: COMMIT_MESSAGES
  #     Concatenates the branch's commit messages into the squash body.
  #     Preserves the hand-crafted commit bodies (rationale +
  #     Co-Authored-By trailers) instead of replacing them with the PR
  #     description, which on Renovate PRs is a wall of changelog noise.
  squash_merge_commit_title: COMMIT_OR_PR_TITLE
  squash_merge_commit_message: COMMIT_MESSAGES

# Labels — Dependabot / Renovate apply these automatically once they exist.
# Without this block GitHub auto-creates labels with arbitrary colors on
# first use; defining them here pins names + colors + descriptions.
labels:
  - name: dependencies
    color: "0366d6"
    description: Pull requests that update a dependency
  - name: github-actions
    color: "000000"
    description: GitHub Actions workflow changes or action version bumps
  - name: go
    color: "00add8"
    description: Go module updates or Go-language code changes
  - name: bug
    color: "d73a4a"
    description: Something isn't working
  - name: enhancement
    color: "a2eeef"
    description: New feature or improvement to an existing one
  - name: documentation
    color: "0075ca"
    description: README / inline doc changes
  - name: ci
    color: "ededed"
    description: CI / workflow changes
  - name: security
    color: "ee0701"
    description: Security-relevant change or advisory

# Branch protection — gates merges to main on the CI aggregator job.
# Closes the "branch protection not yet configured" follow-up.
#
# Probot Settings App gotchas observed on the first apply attempt (and
# documented at repository-settings/app#923 and friends):
#
#  - `enforce_admins: false` is silently rejected; the entire protection
#    block then fails to apply. Use `null` (or omit the key entirely).
#    That's why the first push of this file left the repo with no
#    protection at all.
#  - `restrictions: false` has the same problem — use `null`.
#  - `required_pull_request_reviews: null` works, but some App releases
#    have flaked on it; an explicit object with `required_approving_review_count: 0`
#    is safer for solo workflows.
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        # Context names must match the check-run names GitHub records
        # exactly — that's the job's `name:` field, not "workflow / job".
        # The check must also have run on this repo at least once before
        # it can be marked required.
        #
        # Aggregator pattern (mirrors dump1090-exporter): expand each
        # aggregator's `needs:` list to add new checks rather than adding
        # individual check names here. That way Probot doesn't have to
        # be re-applied every time we add a CI job.
        #
        #  - `ci required checks passed` (ci.yml) — needs: lint, test ×3,
        #    mcp-smoke ×3, coverage
        #  - `security required checks passed` (security.yml) — needs:
        #    changes, codeql, gitleaks, trivy-fs, zizmor, dependency-review
        #  - `conventional PR title` (pr-title.yml) — gates the squash
        #    commit subject, which release-please parses for version bumps
        #
        # `OSSF Scorecard` is intentionally NOT required: scorecard.yml
        # only triggers on push + schedule + branch_protection_rule, so
        # requiring it would leave every PR perpetually pending.
        strict: true
        contexts:
          - "ci required checks passed"
          - "security required checks passed"
          - "conventional PR title"
      # `null` (not `false`) — the Probot Settings App rejects `false`
      # here silently. See repository-settings/app#923.
      enforce_admins: null
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: false
      # `required_signatures` is intentionally OMITTED. It is NOT a valid
      # field of the branch-protection PUT body (signatures are managed
      # via a separate /required_signatures endpoint). Including it as
      # `false` here caused GitHub to reject the whole protection payload
      # — that's why no protection was applied on the previous push, and
      # why the labels/description/merge-buttons applied (those use
      # different API calls) but protection didn't.
      # Same `null`-vs-empty-array gotcha; explicit `null` for safety.
      restrictions: null
